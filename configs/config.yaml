# Zenith root Hydra config. Override any value on the CLI; sweep with `-m`.
defaults:
  - _self_
  - model: decoder
  - training: default
  - data: tiny
  - tokenizer: byte     # `tokenizer=bpe` for a learned subword vocabulary
  - peft: none          # `peft=lora` to fine-tune a low-rank adapter
  - tracking: mlflow

seed: 0
