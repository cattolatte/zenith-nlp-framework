epochs: 20
batch_size: 32
learning_rate: 3e-4
weight_decay: 0.1
warmup_steps: 100
grad_clip: 1.0
# scaling
grad_accum_steps: 1
amp: false
amp_dtype: bf16      # bf16 or fp16 (fp16 loss-scaling applies on CUDA)
# in-training samples
sample_prompt: ""
sample_tokens: 160
sample_temperature: 0.8
log_samples: true
# reproducibility
deterministic: false
record_dir: runs      # written under the Hydra run dir; null to disable
save_path: zenith-lm.pt
