name: Release

# Publishes to PyPI on a version tag via trusted publishing (OIDC — no API token).
#
# Disabled by default so tags don't fail before publishing is set up. To enable:
#   1. Create the PyPI project and add a "trusted publisher" for this repo + this
#      workflow (`release.yml`), and create a GitHub environment named `pypi`.
#   2. Set repository variable `PUBLISH_TO_PYPI` to `true`
#      (Settings → Secrets and variables → Actions → Variables).
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    if: vars.PUBLISH_TO_PYPI == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
